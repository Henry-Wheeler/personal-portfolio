function b64ToBuf(b64){
  const bin = atob(b64);
  const buf = new Uint8Array(bin.length);
  for (let i=0;i<bin.length;i++) buf[i] = bin.charCodeAt(i);
  return buf.buffer;
}

function setup(canvas, errEl, b64){
  const renderer = new THREE.WebGLRenderer({canvas, antialias:true});
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x222222);
  const cam = new THREE.PerspectiveCamera(40, 1, 0.01, 100);
  cam.position.set(2.2, 1.2, 2.2);
  scene.add(new THREE.HemisphereLight(0xffffff, 0x333333, 1.5));
  const dir = new THREE.DirectionalLight(0xffffff, 1.0); dir.position.set(2,3,2); scene.add(dir);
  scene.add(new THREE.GridHelper(2, 10, 0x444444, 0x333333));
  const ax = new THREE.AxesHelper(0.4); scene.add(ax);
  const ctrl = new OrbitControls(cam, canvas);
  ctrl.target.set(0, 0.85, 0);
  try {
    new GLTFLoader().parse(b64ToBuf(b64), '', g => {
      scene.add(g.scene);
      const box = new THREE.Box3().setFromObject(g.scene);
      const center = box.getCenter(new THREE.Vector3());
      ctrl.target.copy(center);
      ctrl.update();
    }, err => { errEl.textContent = 'load error: '+err.message; });
  } catch(e){ errEl.textContent = 'parse error: '+e.message; }
  function resize(){
    const w = canvas.clientWidth, h = canvas.clientHeight;
    renderer.setSize(w,h,false); cam.aspect = w/h; cam.updateProjectionMatrix();
  }
  function loop(){ resize(); ctrl.update(); renderer.render(scene,cam); requestAnimationFrame(loop); }
  loop();
}
setup(document.getElementById('c1'), document.getElementById('e1'), ORIG_B64);
setup(document.getElementById('c2'), document.getElementById('e2'), NEW_B64);
